server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Agent proxy — all /agent/* requests go to the companion agent backend.
    # companion runs out-of-stack on the docker host's port 7778; resolution to
    # the host is wired via `extra_hosts: ["companion:host-gateway"]` on the
    # frontend service in infra/docker-compose.yml.
    location /agent/ {
        proxy_pass http://companion:7778/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 300s;
        # SSE/long-poll support for /events and the like.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # API proxy — all /api/* requests go to orchestrator
    location /api/ {
        proxy_pass http://orchestrator:8000;
        # HTTP/1.1 is required for SSE — under HTTP/1.0 nginx buffers the full
        # response regardless of `proxy_buffering off`, because chunked transfer
        # encoding only exists in HTTP/1.1. Without this line `/api/v1/.../logs/
        # {service}?follow=true` would not stream events to the client.
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 300s;
        # SSE support (e.g. /api/v1/jobs/{id}/artifacts/logs/{service}?follow=true):
        # disable response buffering and caching so events flush to the client
        # per-line, and allow chunked transfer for the open-ended stream.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # WebSocket proxy — /ws/* with protocol upgrade
    location /ws/ {
        proxy_pass http://orchestrator:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Webhook proxy — GitHub POSTs to /webhook
    location /webhook {
        proxy_pass http://orchestrator:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check proxy — /health and /health/ready
    location /health {
        proxy_pass http://orchestrator:8000;
        proxy_set_header Host $host;
    }

    # Dashboard proxy — legacy HTML dashboard
    location /dashboard {
        proxy_pass http://orchestrator:8000;
        proxy_set_header Host $host;
    }

    # Stats proxy — public stats endpoint
    location /stats {
        proxy_pass http://orchestrator:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback — all other routes serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
