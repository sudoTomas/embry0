name: athanor

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: athanor-frontend
    ports:
      - "${PROD_PORT:-8200}:80"
    depends_on:
      orchestrator:
        condition: service_healthy
    networks: [frontend]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  orchestrator:
    build:
      context: ..
      dockerfile: infra/Dockerfile.orchestrator
    container_name: athanor-orchestrator
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-athanor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-athanor}"
      DOCKER_HOST: tcp://dind:2376
      DOCKER_TLS_VERIFY: "1"
      DOCKER_CERT_PATH: /certs/client
      AUDIT_LOG_PATH: /data/audit.jsonl
      TZ: "${TZ:-America/New_York}"
    env_file: ../.env
    expose:
      - "8000"
    volumes:
      - dind-certs-client:/certs/client:ro
      - orchestrator-data:/data
      # Claude CLI OAuth credentials (for Agent SDK triage calls)
      - ${HOME}/.claude:/home/orchestrator/.claude:ro
    depends_on:
      postgres:
        condition: service_healthy
      dind:
        condition: service_healthy
      init-sandbox-networks:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "${ORCHESTRATOR_CPUS:-4}"
          memory: "${ORCHESTRATOR_MEMORY:-4G}"
        reservations:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks: [frontend, backend]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: athanor-postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-athanor}"
      POSTGRES_USER: "${POSTGRES_USER:-athanor}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-athanor}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    networks: [backend]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped

  dind:
    image: docker:dind
    container_name: athanor-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: /certs
      DOCKER_TLS_SAN: DNS:dind,DNS:localhost,DNS:docker
    volumes:
      - dind-certs-ca:/certs/ca
      - dind-certs-client:/certs/client
      - dind-storage:/var/lib/docker
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${DIND_CPUS:-4}"
          memory: "${DIND_MEMORY:-8G}"
        reservations:
          cpus: "1"
          memory: 2G
    networks: [backend]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  init-sandbox-networks:
    image: docker:cli
    container_name: athanor-init-sandbox-networks
    entrypoint: ["sh"]
    command: ["/scripts/setup-sandbox-networks.sh"]
    environment:
      DOCKER_HOST: tcp://dind:2376
      DOCKER_TLS_VERIFY: "1"
      DOCKER_CERT_PATH: /certs/client
    volumes:
      - dind-certs-client:/certs/client:ro
      - ./scripts:/scripts:ro
    depends_on:
      dind:
        condition: service_healthy
    networks: [backend]
    restart: "no"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: athanor-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --metrics 0.0.0.0:2000 run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARED_TUNNEL_TOKEN:?CLOUDFLARED_TUNNEL_TOKEN must be set — see .env.example}"
    depends_on:
      orchestrator:
        condition: service_healthy
    networks: [backend]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "127.0.0.1:2000", "ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  orchestrator-data:
  dind-certs-ca:
  dind-certs-client:
  dind-storage:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
