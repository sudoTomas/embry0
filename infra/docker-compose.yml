name: embry0

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # VITE_API_KEY must match the backend API_KEY. Defaults to API_KEY so a
        # single value in the root .env covers both surfaces. Override by
        # setting VITE_API_KEY explicitly if you want them to differ.
        VITE_API_KEY: "${VITE_API_KEY:-${API_KEY:-}}"
    container_name: embry0-frontend
    environment:
      # Server-side bearer for the /agent proxy; from root .env, never in the bundle.
      EMBRY0_AGENT_TOKEN: "${EMBRY0_AGENT_TOKEN:-}"
    ports:
      - "${PROD_PORT:-8200}:80"
    depends_on:
      orchestrator:
        condition: service_healthy
    # nginx's `location /agent/ { proxy_pass http://companion:7778/; }` resolves
    # `companion` through Docker DNS. companion runs out-of-stack on the docker host
    # (private-server:7778), so we map the hostname to the host gateway.
    extra_hosts:
      - "companion:host-gateway"
    networks: [frontend]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  orchestrator:
    build:
      context: ..
      dockerfile: infra/Dockerfile.orchestrator
    container_name: embry0-orchestrator
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-athanor}:${POSTGRES_PASSWORD:?must be set}@postgres:5432/${POSTGRES_DB:-athanor}"
      DOCKER_HOST: tcp://dind:2376
      DOCKER_TLS_VERIFY: "1"
      DOCKER_CERT_PATH: /certs/client
      AUDIT_LOG_PATH: /data/audit.jsonl
      TZ: "${TZ:-America/New_York}"
    env_file: ../.env
    expose:
      - "8000"
    volumes:
      - dind-certs-client:/certs/client:ro
      - orchestrator-data:/data
      # Claude CLI OAuth credentials (for Agent SDK triage calls)
      - ${HOME}/.claude:/home/orchestrator/.claude:ro
    depends_on:
      postgres:
        condition: service_healthy
      dind:
        condition: service_healthy
      init-sandbox-networks:
        condition: service_completed_successfully
      init-push-images:
        condition: service_completed_successfully
      minio:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "${ORCHESTRATOR_CPUS:-4}"
          memory: "${ORCHESTRATOR_MEMORY:-4G}"
        reservations:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks: [frontend, backend]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  postgres:
    image: postgres:16.6-alpine
    container_name: embry0-postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-athanor}"
      POSTGRES_USER: "${POSTGRES_USER:-athanor}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?must be set}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-athanor}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    networks: [backend]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: embry0-postgres-backup
    restart: unless-stopped
    volumes:
      - backup-data:/backups
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: "${POSTGRES_DB:-athanor}"
      POSTGRES_USER: "${POSTGRES_USER:-athanor}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?must be set}"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "7"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "6"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [backend]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    container_name: embry0-minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?must be set}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?must be set}"
    volumes:
      - minio-data:/data
    expose:
      - "9000"   # S3 API
      - "9001"   # Console UI
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://127.0.0.1:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" >/dev/null 2>&1 && mc ready local"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks: [backend]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  dind:
    image: docker:27-dind
    container_name: embry0-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: /certs
      DOCKER_TLS_SAN: DNS:dind,DNS:localhost,DNS:docker
    volumes:
      - dind-certs-ca:/certs/ca
      - dind-certs-client:/certs/client
      - dind-storage:/var/lib/docker
      # Allow DinD to pull from the in-stack `registry` service over plain HTTP.
      - ./dind-daemon.json:/etc/docker/daemon.json:ro
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${DIND_CPUS:-4}"
          memory: "${DIND_MEMORY:-8G}"
        reservations:
          cpus: "1"
          memory: 2G
    networks: [backend]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  init-sandbox-networks:
    image: docker:27-cli
    container_name: embry0-init-sandbox-networks
    entrypoint: ["sh"]
    command: ["/scripts/setup-sandbox-networks.sh"]
    environment:
      DOCKER_HOST: tcp://dind:2376
      DOCKER_TLS_VERIFY: "1"
      DOCKER_CERT_PATH: /certs/client
    volumes:
      - dind-certs-client:/certs/client:ro
      - ./scripts:/scripts:ro
    depends_on:
      dind:
        condition: service_healthy
    networks: [backend]
    restart: "no"

  # In-stack container registry. Sandbox + proxy images are pushed here at
  # bootstrap so DinD (and any future K8s cluster) can pull them by name —
  # the same flow that production registries use, just on the backend bridge.
  # Not exposed publicly.
  registry:
    image: registry:2
    container_name: embry0-registry
    volumes:
      - registry-data:/var/lib/registry
    # `expose` for backend-network access from DinD/orchestrator.
    # `ports` (loopback-only) lets the host docker daemon push images via the
    # init-push-images sidecar, which reaches the registry through the mounted
    # docker.sock and out of the host's network namespace. Docker treats
    # 127.0.0.1 as insecure-by-default, so no host daemon.json edit is needed.
    expose:
      - "5000"
    ports:
      - "127.0.0.1:5001:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/v2/"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5
    networks: [backend]
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: unless-stopped

  # Build-only services. Their images aren't run as compose services — they're
  # pushed to the local `registry` and pulled into DinD on demand. Profiled out
  # so `docker compose up -d` does not try to start them.
  sandbox-image-builder:
    profiles: ["images"]
    image: athanor-sandbox:latest
    build:
      context: ..
      dockerfile: infra/Dockerfile.sandbox
      # Dockerfile.sandbox is multi-stage; without an explicit target the
      # final stage (dev-python) would be tagged as the slim sandbox.
      target: base

  dev-python-image-builder:
    profiles: ["images"]
    image: athanor-sandbox-dev-python:latest
    build:
      context: ..
      dockerfile: infra/Dockerfile.sandbox
      target: dev-python

  proxy-image-builder:
    profiles: ["images"]
    image: athanor-proxy:latest
    build:
      context: ..
      dockerfile: infra/Dockerfile.proxy

  # Tag the host-built athanor-sandbox + athanor-proxy images and push them to
  # the in-stack registry. The orchestrator depends on this completing so the
  # proxy containers it launches in DinD can pull successfully on first ref.
  init-push-images:
    image: docker:27-cli
    container_name: embry0-init-push-images
    entrypoint: ["sh"]
    command: ["/scripts/push-images-to-registry.sh"]
    environment:
      # Push target — host-loopback exposure of the registry. The mounted
      # docker.sock means the actual push is performed by the host daemon,
      # which reaches the registry via the host's loopback interface.
      REGISTRY: 127.0.0.1:5001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts:ro
    depends_on:
      registry:
        condition: service_healthy
    restart: "no"

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    container_name: embry0-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --metrics 0.0.0.0:2000 run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARED_TUNNEL_TOKEN:?CLOUDFLARED_TUNNEL_TOKEN must be set — see .env.example}"
    depends_on:
      orchestrator:
        condition: service_healthy
    networks: [backend]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "127.0.0.1:2000", "ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  orchestrator-data:
  dind-certs-ca:
  dind-certs-client:
  dind-storage:
  backup-data:
  minio-data:
  registry-data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
