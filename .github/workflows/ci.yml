name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.6-alpine
        env:
          POSTGRES_USER: embry0
          POSTGRES_PASSWORD: embry0_ci
          POSTGRES_DB: embry0_unit_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      TEST_DATABASE_URL: postgresql://embry0:embry0_ci@localhost:5432/embry0_unit_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check embry0/ tests/

      - name: Ruff format check
        run: ruff format --check embry0/ tests/

      - name: Verify app imports
        run: python -c "from embry0.api.app import create_app; print('OK')"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --timeout=30

  build-images:
    name: Docker image builds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: orchestrator
            dockerfile: infra/Dockerfile.orchestrator
            context: .
          - name: sandbox
            dockerfile: infra/Dockerfile.sandbox
            context: .
          - name: proxy
            dockerfile: infra/Dockerfile.proxy
            context: .
          - name: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: embry0-${{ matrix.name }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  build-qa-sandbox-image:
    name: Build QA sandbox image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build embry0-sandbox-qa
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.sandbox.qa
          tags: embry0-sandbox-qa:latest
          push: false
          load: true
          cache-from: type=gha,scope=sandbox-qa
          cache-to: type=gha,mode=max,scope=sandbox-qa
      - name: Smoke-test runtimes
        run: |
          docker run --rm embry0-sandbox-qa:latest bash -c '
            java -version 2>&1 &&
            node --version &&
            python --version &&
            docker --version &&
            docker compose version &&
            playwright --version
          '

  mypy:
    name: Mypy type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Mypy
        run: mypy embry0

  frontend:
    name: Frontend Build & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build

  security:
    name: Security scanning
    runs-on: ubuntu-latest
    needs: [build-images]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Re-build images from cache (fast; GHA cache populated by build-images job)
      - name: Restore orchestrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.orchestrator
          push: false
          tags: embry0-orchestrator:ci
          load: true
          cache-from: type=gha,scope=orchestrator

      - name: Restore sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.sandbox
          push: false
          tags: embry0-sandbox:ci
          load: true
          cache-from: type=gha,scope=sandbox

      - name: Restore proxy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.proxy
          push: false
          tags: embry0-proxy:ci
          load: true
          cache-from: type=gha,scope=proxy

      - name: Restore frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: embry0-frontend:ci
          load: true
          cache-from: type=gha,scope=frontend

      - name: Hadolint — orchestrator
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infra/Dockerfile.orchestrator
          config: .hadolint.yaml
          failure-threshold: warning

      - name: Hadolint — sandbox
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infra/Dockerfile.sandbox
          config: .hadolint.yaml
          failure-threshold: warning

      - name: Hadolint — proxy
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infra/Dockerfile.proxy
          config: .hadolint.yaml
          failure-threshold: warning

      - name: Hadolint — frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

      - name: Trivy — orchestrator
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: embry0-orchestrator:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Trivy — sandbox
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: embry0-sandbox:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Trivy — proxy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: embry0-proxy:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Trivy — frontend
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: embry0-frontend:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      # gitleaks/gitleaks-action@v2 requires a paid license for org accounts.
      # Run the open-source CLI directly instead — same scanner, no license.
      - name: gitleaks (open-source CLI)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.18.4
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --redact \
            --no-banner \
            --verbose

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [build-images]
    services:
      postgres:
        image: postgres:16.6-alpine
        env:
          POSTGRES_USER: embry0
          POSTGRES_PASSWORD: embry0_ci
          POSTGRES_DB: embry0_integration_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      TEST_DATABASE_URL: postgresql://embry0:embry0_ci@localhost:5432/embry0_integration_test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore proxy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.proxy
          push: false
          tags: embry0-proxy:latest
          load: true
          cache-from: type=gha,scope=proxy

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short --timeout=120
