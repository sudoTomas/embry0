name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.6-alpine
        env:
          POSTGRES_USER: athanor
          POSTGRES_PASSWORD: athanor_ci
          POSTGRES_DB: athanor_unit_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      TEST_DATABASE_URL: postgresql://athanor:athanor_ci@localhost:5432/athanor_unit_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check athanor/ tests/

      - name: Ruff format check
        run: ruff format --check athanor/ tests/

      - name: Verify app imports
        run: python -c "from athanor.api.app import create_app; print('OK')"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --timeout=30

  build-images:
    name: Docker image builds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: orchestrator
            dockerfile: infra/Dockerfile.orchestrator
            context: .
          - name: sandbox
            dockerfile: infra/Dockerfile.sandbox
            context: .
          - name: proxy
            dockerfile: infra/Dockerfile.proxy
            context: .
          - name: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: athanor-${{ matrix.name }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  mypy:
    name: Mypy type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Mypy
        run: mypy athanor

  frontend:
    name: Frontend Build & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build

  security:
    name: Security scanning
    runs-on: ubuntu-latest
    needs: [build-images]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Re-build images from cache (fast; GHA cache populated by build-images job)
      - name: Restore orchestrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.orchestrator
          push: false
          tags: athanor-orchestrator:ci
          load: true
          cache-from: type=gha,scope=orchestrator

      - name: Restore sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.sandbox
          push: false
          tags: athanor-sandbox:ci
          load: true
          cache-from: type=gha,scope=sandbox

      - name: Restore proxy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.proxy
          push: false
          tags: athanor-proxy:ci
          load: true
          cache-from: type=gha,scope=proxy

      - name: Restore frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: athanor-frontend:ci
          load: true
          cache-from: type=gha,scope=frontend

      - name: Hadolint — orchestrator
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infra/Dockerfile.orchestrator
          config: .hadolint.yaml
          failure-threshold: warning

      - name: Hadolint — sandbox
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infra/Dockerfile.sandbox
          config: .hadolint.yaml
          failure-threshold: warning

      - name: Hadolint — proxy
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infra/Dockerfile.proxy
          config: .hadolint.yaml
          failure-threshold: warning

      - name: Hadolint — frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning

      - name: Trivy — orchestrator
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: athanor-orchestrator:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Trivy — sandbox
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: athanor-sandbox:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Trivy — proxy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: athanor-proxy:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Trivy — frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: athanor-frontend:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [build-images]
    services:
      postgres:
        image: postgres:16.6-alpine
        env:
          POSTGRES_USER: athanor
          POSTGRES_PASSWORD: athanor_ci
          POSTGRES_DB: athanor_integration_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      TEST_DATABASE_URL: postgresql://athanor:athanor_ci@localhost:5432/athanor_integration_test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore proxy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.proxy
          push: false
          tags: athanor-proxy:latest
          load: true
          cache-from: type=gha,scope=proxy

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short --timeout=120
