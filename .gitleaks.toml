# Gitleaks configuration
# https://github.com/gitleaks/gitleaks

[extend]
useDefault = true

# Global allowlist: applies to all rules. Listing both `paths` and `regexes`
# at the same level is OR-combined (any single match suppresses the finding).
[allowlist]
description = "embry0 allowlist — placeholder + test fixture exemptions"
paths = [
    # Test fixtures that use deliberately fake secrets (placeholder webhook
    # secrets / wrong-key literals) which trip the generic-api-key rule.
    '''tests/unit/storage/test_integration_config\.py''',
    '''tests/unit/api/v2/test_login_route\.py''',
]
regexes = [
    # Placeholder GitHub token pattern in docs / fixtures
    '''ghp_your-github-personal-access-token''',
    # sk-ant prefix without a real key shape
    '''sk-ant-your-api-key-here''',
    # Synthetic sandbox token (40-char a-z0-9 ramp) used by QA + sandbox unit tests
    # to satisfy _SANDBOX_TOKEN_RE in embry0/sandbox/github/git_ops.py.
    '''abcdefghijklmnopqrstuvwxyz0123456789ABCD''',
]
